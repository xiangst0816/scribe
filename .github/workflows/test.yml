name: Tests

# `swift test` requires the full Xcode toolchain (CommandLineTools alone doesn't
# bundle XCTest on macOS). The macos-15 runner ships Xcode 16, which provides
# Swift 6 — same toolchain the release workflow uses.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    name: swift test
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-test-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-test-${{ runner.os }}-

      - name: swift test
        run: swift test --parallel
