name: Release macOS app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3). Leave blank to use the run number.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so the appcast step can fast-forward main and push back.
          fetch-depth: 0

      - name: Select Xcode
        # macos-15 ships Xcode 16 by default, which provides Swift 6 — required by
        # swift-jinja >= 2.0 (a transitive dep of WhisperKit / argmax-oss-swift).
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          swift --version

      - name: Resolve version
        id: ver
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION="$INPUT_VERSION"
            [ -z "$VERSION" ] && VERSION="0.0.0+${RUN_NUMBER}"
          fi
          # Strip anything outside [A-Za-z0-9._+-] to neutralize injection-prone input.
          VERSION="$(printf '%s' "$VERSION" | tr -cd 'A-Za-z0-9._+-')"
          if [ -z "$VERSION" ]; then
            echo "Resolved version is empty after sanitization." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building Scribe $VERSION"

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Import signing certificate
        id: keychain
        env:
          CERT_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$CERT_BASE64" ]; then
            echo "no_cert=1" >> "$GITHUB_OUTPUT"
            echo "::warning::MACOS_CERT_P12_BASE64 not set — falling back to ad-hoc signing (no notarization)."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          printf '%s' "$CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          rm -f "$CERT_PATH"

          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
          if [ -z "$IDENTITY" ]; then
            echo "No 'Developer ID Application' identity found in imported certificate." >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" >&2
            exit 1
          fi
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"
          echo "keychain=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"
          echo "Signing as: $IDENTITY"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build, sign & package (.app + .zip + .dmg)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          IDENTITY: ${{ steps.keychain.outputs.identity }}
          NO_CERT: ${{ steps.keychain.outputs.no_cert }}
        run: |
          if [ -n "$NO_CERT" ]; then
            make release VERSION="$VERSION"
            make dmg     VERSION="$VERSION"
          else
            make release VERSION="$VERSION" \
              CODESIGN_IDENTITY="$IDENTITY" \
              ENTITLEMENTS=Scribe.entitlements
            make dmg     VERSION="$VERSION" \
              CODESIGN_IDENTITY="$IDENTITY" \
              ENTITLEMENTS=Scribe.entitlements
          fi

      - name: Notarize & staple (.app, .dmg)
        if: steps.keychain.outputs.identity != ''
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          APP_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          submit() {
            xcrun notarytool submit "$1" \
              --apple-id "$APPLE_ID" \
              --password "$APP_PASSWORD" \
              --team-id "$TEAM_ID" \
              --wait
          }

          echo "→ Notarizing Scribe.zip (covers the .app inside)…"
          submit Scribe.zip

          echo "→ Stapling ticket to Scribe.app…"
          xcrun stapler staple Scribe.app
          xcrun stapler validate Scribe.app
          spctl --assess --type execute --verbose=2 Scribe.app

          echo "→ Re-zipping stapled bundle…"
          rm -f Scribe.zip
          ditto -c -k --keepParent Scribe.app Scribe.zip

          echo "→ Notarizing Scribe.dmg…"
          submit Scribe.dmg
          xcrun stapler staple Scribe.dmg
          xcrun stapler validate Scribe.dmg
          spctl --assess --type open --context context:primary-signature --verbose=2 Scribe.dmg

      - name: Clean up keychain
        if: always() && steps.keychain.outputs.keychain != ''
        env:
          KEYCHAIN_PATH: ${{ steps.keychain.outputs.keychain }}
        run: security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Sign update for Sparkle (EdDSA)
        id: sparkle
        if: github.event_name == 'push' && env.SPARKLE_PRIVATE_KEY != ''
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -x
          # Sparkle's release tarball is small enough that fetching the whole thing
          # is simpler than figuring out the right `tar` member-name syntax.
          curl -fsSL -o /tmp/sparkle.tar.xz \
            https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          SIGN_UPDATE="$(find /tmp/sparkle -type f -name sign_update -perm +111 | head -1)"
          if [ -z "$SIGN_UPDATE" ]; then
            echo "sign_update binary not found in Sparkle tarball." >&2
            find /tmp/sparkle -type f -name sign_update >&2 || true
            exit 1
          fi

          KEY_FILE="$RUNNER_TEMP/sparkle_priv.txt"
          # Strip everything that isn't a base64 character. Catches stray newlines
          # and the zsh `%` "no-newline" display artifact users sometimes copy in.
          printf '%s' "$SPARKLE_PRIVATE_KEY" | tr -dc 'A-Za-z0-9+/=' > "$KEY_FILE"
          KEY_LEN=$(wc -c < "$KEY_FILE" | tr -d ' ')
          echo "Sanitized key file is $KEY_LEN bytes (expected 44 for a 32-byte EdDSA seed)."

          # Output looks like: sparkle:edSignature="..." length="12345"
          OUT="$("$SIGN_UPDATE" -f "$KEY_FILE" Scribe.zip)" || RC=$?
          rm -f "$KEY_FILE"
          echo "Sparkle output: $OUT"
          if [ -n "${RC:-}" ]; then
            echo "sign_update exited with $RC" >&2
            exit "$RC"
          fi

          SIG="$(echo "$OUT" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')"
          LEN="$(echo "$OUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')"
          if [ -z "$SIG" ] || [ -z "$LEN" ]; then
            echo "Failed to parse sign_update output." >&2
            exit 1
          fi
          echo "ed_signature=$SIG" >> "$GITHUB_OUTPUT"
          echo "length=$LEN" >> "$GITHUB_OUTPUT"

      - name: Update appcast.xml on main
        if: steps.sparkle.outputs.ed_signature != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.ver.outputs.version }}
          ED_SIG: ${{ steps.sparkle.outputs.ed_signature }}
          LENGTH: ${{ steps.sparkle.outputs.length }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          PUB_DATE="$(date -u +'%a, %d %b %Y %H:%M:%S +0000')" \
            python3 scripts/update_appcast.py

          # Stage first so newly-created files (the very first release) are
          # also visible to the change check — `git diff` alone misses untracked.
          git add web/public/appcast.xml
          if git diff --cached --quiet -- web/public/appcast.xml; then
            echo "No appcast.xml changes to commit."
            exit 0
          fi
          git commit -m "Publish Sparkle appcast for ${TAG}"
          git push origin main

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scribe-${{ steps.ver.outputs.version }}
          path: |
            Scribe.zip
            Scribe.dmg
          if-no-files-found: error

      - name: Create / update GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          NOTARIZED: ${{ steps.keychain.outputs.identity != '' }}
        run: |
          if [ "$NOTARIZED" = "true" ]; then
            TRUST_LINE="- Signed & notarized by Apple — opens with one click."
          else
            TRUST_LINE="- Ad-hoc signed; right-click → Open on first launch."
          fi
          NOTES="Automated build of \`$TAG\`.

          - macOS 14+ · Apple Silicon
          - **Scribe.dmg** — recommended; double-click and drag into Applications.
          - **Scribe.zip** — same .app, no installer; unzip and move it yourself.
          $TRUST_LINE

          See [README](https://github.com/${REPO}#readme) for setup."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" Scribe.zip Scribe.dmg --clobber
          else
            gh release create "$TAG" Scribe.zip Scribe.dmg \
              --title "Scribe $TAG" \
              --notes "$NOTES"
          fi
